# =====================================================
# Configuração do banco de dados - PostgreSQL Local e Docker
# =====================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sigrest_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# =====================================================
# Configuração do Hibernate (JPA)
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================================================
# Configurações adicionais
# =====================================================
spring.jpa.open-in-view=false
server.port=8080

# Incluir mensagem de erro nas respostas HTTP (para feedback útil no frontend)
server.error.include-message=always