# =====================================================
# Test database - H2 in-memory (replaces PostgreSQL)
# =====================================================
spring.datasource.url=jdbc:h2:mem:sigrest_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP - minimal settings for in-memory tests
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.keepalive-time=0

# =====================================================
# Hibernate - create/drop schema for each test run
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
