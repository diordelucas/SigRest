services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: sigrest_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./SigRestBack
      dockerfile: Dockerfile
    container_name: sigrest_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./sigrest-frontend
      dockerfile: Dockerfile
    container_name: sigrest_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0

  maven:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./SigRestBack:/app

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./sigrest-frontend:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
    name: postgres_data
  node_modules:
